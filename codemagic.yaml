workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Generate missing platform files
        script: |
          flutter create --platforms=android .
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt

  web-workflow:
    name: Web Workflow
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Generate missing platform files
        script: |
          flutter create --platforms=web .
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Web
        script: |
          flutter build web --release
    artifacts:
      - build/web
